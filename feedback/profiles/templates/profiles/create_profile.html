{% extends "base.html" %}
{% load static %}
{% load widget_tweaks %}
{% block title %}
  Create Profile
{% endblock title %}
{% block content %}
  <div class="form-container">
    <div class="form-header">
      <h2>Upload your profile picture</h2>
    </div>
    <div class="form-panel">
      <strong>Upload your profile picture</strong>
      <form action="{% url 'create-profile' %}"
            method="post"
            enctype="multipart/form-data"
            class="form">
        {% csrf_token %}
        {{ form.user_image|add_class:'form-field' }}
        <button class="default-button" type="submit">Upload</button>
      </form>
    </div>
  </div>
{% endblock content %}
