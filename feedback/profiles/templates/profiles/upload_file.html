{% extends 'reviews/base.html' %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'profiles/style.css' %}" />
    {% block title %}
      Upload File
    {% endblock %}
  </head>
  <body>
    {% block content %}
      <div class="form-container">
        <div class="form-header">
          <h2>Upload your profile picture</h2>
        </div>
        <div class="form-panel">
          <strong>Upload your profile picture</strong>
          <form action="{% url 'upload-file' %}" method="post" enctype="multipart/form-data" class="form">
            {% csrf_token %}
            <input type="file" name="file_upload" id="file_upload" />
            <button class="default-button" type="submit">Upload</button>
          </form>
        </div>
      </div>
    {% endblock %}
  </body>
</html>
