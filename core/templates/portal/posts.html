{% extends "core/base.html" %}
{% load static %}
{% load widget_tweaks %}

{% block title %}Posts{% endblock title %}

{% block content %}
    <h1>Posts</h1>
   <div class="tile_layout">
       
           {% for post in posts %}
               <div class="tile">{{ post.title|title }}</div>
           {% empty %}
               <div class="tile">No posts found.</div>
           {% endfor %}
   </div>
{% endblock content %}

{% block script %}
<script src="{% static 'portal/js/portal_scripts.js' %}"></script>
{% endblock script %}
