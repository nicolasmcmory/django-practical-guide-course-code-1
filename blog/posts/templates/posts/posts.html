{% extends "base.html" %}
{% block title %}
    Posts
{% endblock title %}
{% block content %}
    <div class="container">
        <h1 class="mb-2">Posts</h1>
        <div class="post-list">
            {% for post in posts %}
                <div class="post-item">
                    <h2>{{ post.title }}</h2>
                    <p>{{ post.date }}</p>
                    <p>{{ post.content|truncatechars:100 }}</p>
                    <a href="{{ post.get_absolute_url }}" class="btn btn-primary">Read More</a>
                </div>
            {% empty %}
                <p>No posts available.</p>
            {% endfor %}
        </div>
    </div>
{% endblock content %}
